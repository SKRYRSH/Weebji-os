name: Scheduled Push Notifications

on:
  schedule:
    # streak_reminder — 6pm UTC daily (users who haven't checked in today)
    - cron: '0 18 * * *'
    # morning_activation — 7am UTC daily
    - cron: '0 7 * * *'
    # comeback — noon UTC daily (users inactive 3+ days)
    - cron: '0 12 * * *'
    # weekly_summary — 8pm UTC Sunday
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type to send manually'
        required: true
        default: 'streak_reminder'
        type: choice
        options:
          - streak_reminder
          - morning_activation
          - comeback
          - weekly_summary
          - power_window

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Determine notification type
        id: notif
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)  # 1=Mon, 7=Sun
            if [ "$HOUR" = "07" ]; then
              echo "type=morning_activation" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "12" ]; then
              echo "type=comeback" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "18" ]; then
              echo "type=streak_reminder" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "20" ] && [ "$DOW" = "7" ]; then
              echo "type=weekly_summary" >> $GITHUB_OUTPUT
            else
              echo "type=streak_reminder" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Call scheduled-push edge function
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/scheduled-push" \
            -H "x-weebji-cron: true" \
            -H "Content-Type: application/json" \
            -d '{"type":"${{ steps.notif.outputs.type }}"}'
